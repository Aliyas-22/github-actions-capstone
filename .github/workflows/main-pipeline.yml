name: main pipeline

on:
    push:
        branches:
            - main

jobs:
    build-test:
        uses: ./.github/workflows/reusable-build-test.yml
        with:
            python_version: "3.14"
            run_tests: true

    docker:
        needs: build-test
        uses: ./.github/workflows/reusable-docker.yml
        secrets:
            docker_username: ${{ secrets.DOCKER_USERNAME }}
            docker_token: ${{ secrets.DOCKER_TOKEN }}

    deploy:
        needs: docker
        runs-on: ubuntu-latest
        environment: production
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: install docker and setup folders
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ubuntu
                  key: ${{ secrets.EC2_SSH_KEY }}
                  script: |
                      echo "Installing required packages & folders"
                      sudo apt-get update && sudo apt-get install docker.io docker-compose-v2 -y
                      sudo usermod -aG docker $USER
                      mkdir -p devops
            - name: deploy the app
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ubuntu
                  key: ${{ secrets.EC2_SSH_KEY }}
                  script: |
                      echo "Running App"
                      echo ${{ secrets.DOCKER_TOKEN }} | sudo docker login --username ${{ vars.DOCKERHUB_USERNAME }} --password-stdin
                      cd ~/devops
                      echo "Pulling latest image..."
                      sudo docker compose pull
                      echo "Stopping and removing old container..."
                      sudo docker compose down || true
                      sudo docker rmi aliyafirdous22/github-advanced-action-capstone:latest || true
                      echo "Rebuilding and starting fresh container..."
                      sudo docker compose up -d --force-recreate
                      echo " Deployed successfully!"
