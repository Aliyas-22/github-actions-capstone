name: reusable docker build and push

on:
    workflow_call:
        secrets:
            docker_username:
                required: true
            docker_token:
                required: true
        outputs:
            image_url:
                description: "Full image path"
                value: ${{ jobs.build-and-push.outputs.image_url }}

permissions:
    contents: read

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        outputs:
            image_url: ${{ steps.set_output.outputs.image_url }}
        steps:
            - name: checkout the code
              uses: actions/checkout@v4

            - name: login to dockerhub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.docker_username }}
                  password: ${{ secrets.docker_token }}

            - name: set short sha
              id: short_sha
              run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

            - name: build and push to dockerhub
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ vars.DOCKER_USERNAME }}/github-advanced-action-capstone:latest
                      ${{ vars.DOCKER_USERNAME }}/github-advanced-action-capstone:sha-${{ steps.short_sha.outputs.short }}

            - name: scan docker image for vulnerabilities
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ${{ vars.DOCKER_USERNAME }}/github-advanced-action-capstone:latest
                  format: "table"
                  exit-code: "1"
                  severity: "CRITICAL,HIGH"

            - name: set image url output
              id: set_output
              run: echo "image_url=${{ vars.DOCKER_USERNAME }}/github-advanced-action-capstone:sha-${{ steps.short_sha.outputs.short }}" >> $GITHUB_OUTPUT
